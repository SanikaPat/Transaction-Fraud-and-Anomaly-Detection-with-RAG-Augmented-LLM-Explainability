<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection Dashboard</title>
    <style>body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0b1220;
    color: #e5e7eb;
}

/* Layout */
.layout {
    display: flex;
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #111827;
    padding: 20px;
}

.sidebar h2 {
    color: #60a5fa;
    margin-bottom: 5px;
}

.stats {
    margin-top: 20px;
}

.stat-box {
    background: #1f2937;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
}

h1 {
    margin-bottom: 20px;
}

.input-box {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
}

.input-box input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

.input-box button {
    padding: 10px 15px;
    border: none;
    background: #3b82f6;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.input-box button:hover {
    background: #2563eb;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

/* Card */
.card {
    background: #111827;
    padding: 20px;
    border-radius: 14px;
    transition: 0.2s;
    border: 1px solid #1f2937;
}

.card:hover {
    transform: translateY(-4px);
    border-color: #374151;
}

/* Header */
.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Badge */
.badge {
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

.LOW {
    background: #16a34a;
}

.MEDIUM {
    background: #f59e0b;
}

.HIGH {
    background: #dc2626;
}

/* Metrics */
.metrics {
    margin-top: 10px;
    font-size: 14px;
    color: #cbd5e1;
}

/* Explanation */
.explanation {
    margin-top: 15px;
    font-size: 13px;
    color: #d1d5db;
    line-height: 1.5;
}</style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Fraud AI</h2>
        <p>Transaction Monitoring System</p>

        <div class="stats">
            <div class="stat-box">
                <h3>{{ results|length }}</h3>
                <p>Transactions</p>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>Fraud Detection Dashboard</h1>

        <form method="POST" class="input-box">

        <input type="text"
           name="indices"
           placeholder="Enter 3 transaction indices (e.g. 5, 20, 150)"
           required>

        <button type="submit">Analyze</button>

        </form>

        <div class="grid">

            {% for r in results %}
            <div class="card">

                <div class="card-header">
                    <h2>Transaction {{ r.id }}</h2>

                    <span class="badge {{ r.risk }}">
                        {{ r.risk }}
                    </span>
                </div>

                <div class="metrics">
                    <p><b>Amount:</b> ${{ r.amount }}</p>
                    <p><b>Risk Score:</b> {{ r.score }}</p>
                </div>

                <div class="explanation">
                    <h3>Explanation</h3>
                    <p>{{ r.explanation }}</p>
                </div>

            </div>
            {% endfor %}

        </div>

    </div>

</div>

</body>
</html>
